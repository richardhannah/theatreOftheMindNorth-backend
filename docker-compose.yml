services:
  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=theatreofthemind;Username=totm;Password=totm_dev

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: theatreofthemind
      POSTGRES_USER: totm
      POSTGRES_PASSWORD: totm_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totm -d theatreofthemind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
